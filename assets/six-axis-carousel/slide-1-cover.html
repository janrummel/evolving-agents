<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Six-Axis Carousel — Slide 1: Cover</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #0f1629; margin: 0; padding: 0; }

  .canvas {
    width: 1080px; height: 1350px;
    background: linear-gradient(145deg, #0f1629 0%, #161d35 40%, #1a1f3a 70%, #0f1629 100%);
    padding: 64px 72px;
    position: relative;
    overflow: hidden;
  }

  .canvas::before {
    content: ''; position: absolute; inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(99,102,241,0.04) 1px, transparent 0);
    background-size: 28px 28px; pointer-events: none;
  }

  h1, h2, h3 { color: #ffffff; font-weight: 700; }
  .accent { color: #818cf8; }
  .accent-warm { color: #f59e0b; }

  .footer {
    position: absolute; bottom: 32px; right: 40px;
    font-size: 14px; color: #64748b; font-weight: 500;
    letter-spacing: 0.05em;
  }
  .brand {
    position: absolute; bottom: 32px; left: 40px;
    font-size: 14px; color: #64748b; font-weight: 500;
    letter-spacing: 0.05em;
  }

  .tagline {
    font-size: 14px; color: #818cf8; letter-spacing: 0.18em;
    text-transform: uppercase; font-weight: 600; text-align: center;
  }

  .hex-wrap {
    display: flex; justify-content: center; align-items: center;
    margin: 28px 0 20px 0;
  }

  .axis-label {
    font-size: 14px;
    fill: #ffffff;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .axis-pill-text {
    font-size: 11px;
    fill: #a5b4fc;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
  }
  .center-label {
    font-size: 22px;
    fill: #f59e0b;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-anchor: middle;
  }
  .center-sublabel {
    font-size: 12px;
    fill: #fbbf24;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-anchor: middle;
    font-style: italic;
  }
  .headline {
    font-size: 38px; color: #ffffff; font-weight: 700;
    line-height: 1.18; text-align: center; letter-spacing: -0.015em;
    margin-top: 8px;
  }
  .subline {
    font-size: 19px; color: #cbd5e1; font-weight: 400;
    line-height: 1.5; text-align: center; max-width: 880px;
    margin: 18px auto 0;
  }
</style>
</head>
<body>
<div class="canvas">
  <div style="display: flex; flex-direction: column; height: 100%; padding-bottom: 32px;">
    <div class="tagline" style="margin-top: 8px;">AI Agent Maturity · A Six-Axis Map</div>

    <div class="hex-wrap">
      <svg viewBox="0 0 880 880" width="880" height="880" xmlns="http://www.w3.org/2000/svg">
        <!-- Hexagon vertices (regular hexagon, flat-top orientation rotated so vertex is on top)
             Center 440,440. Radius 280. Pointy-top hexagon vertices at angles -90, -30, 30, 90, 150, 210. -->
        <defs>
          <radialGradient id="hexFill" cx="50%" cy="50%" r="55%">
            <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.6"/>
            <stop offset="60%" stop-color="#1a1f3a" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#0f1629" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="centerWarn" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.35"/>
            <stop offset="60%" stop-color="#b45309" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#7c2d12" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <!-- Hexagon shape -->
        <polygon
          points="440,160 682.49,300 682.49,580 440,720 197.51,580 197.51,300"
          fill="url(#hexFill)"
          stroke="#6366f1"
          stroke-width="2.5"
          stroke-opacity="0.85"
        />

        <!-- Connecting spokes from center to each vertex -->
        <g stroke="#312e81" stroke-width="1.2" stroke-opacity="0.55">
          <line x1="440" y1="440" x2="440" y2="160"/>
          <line x1="440" y1="440" x2="682.49" y2="300"/>
          <line x1="440" y1="440" x2="682.49" y2="580"/>
          <line x1="440" y1="440" x2="440" y2="720"/>
          <line x1="440" y1="440" x2="197.51" y2="580"/>
          <line x1="440" y1="440" x2="197.51" y2="300"/>
        </g>

        <!-- Vertex dots -->
        <g fill="#818cf8">
          <circle cx="440" cy="160" r="6"/>
          <circle cx="682.49" cy="300" r="6"/>
          <circle cx="682.49" cy="580" r="6"/>
          <circle cx="440" cy="720" r="6"/>
          <circle cx="197.51" cy="580" r="6"/>
          <circle cx="197.51" cy="300" r="6"/>
        </g>

        <!-- Center blindspot zone -->
        <circle cx="440" cy="440" r="115" fill="url(#centerWarn)" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6 5" stroke-opacity="0.85"/>
        <text x="440" y="420" class="center-label">⚠ Reflection</text>
        <text x="440" y="450" class="center-sublabel">the blind spot</text>
        <text x="440" y="475" class="center-sublabel" style="font-size: 11px; fill: #fde68a;">0 / 4 industry frameworks</text>

        <!-- ========= Vertex 1: TOP — Architecture ========= -->
        <text x="440" y="120" class="axis-label" text-anchor="middle">Architecture</text>
        <g transform="translate(440,135)">
          <rect x="-58" y="-2" width="116" height="22" rx="11" fill="#1e1b4b" stroke="#4338ca" stroke-width="1"/>
          <text x="0" y="13" class="axis-pill-text" text-anchor="middle">arXiv 2601</text>
        </g>

        <!-- ========= Vertex 2: TOP-RIGHT — Trust ========= -->
        <text x="710" y="270" class="axis-label" text-anchor="start">Trust</text>
        <g transform="translate(710,285)">
          <rect x="0" y="-2" width="116" height="22" rx="11" fill="#1e1b4b" stroke="#4338ca" stroke-width="1"/>
          <text x="58" y="13" class="axis-pill-text" text-anchor="middle">ATF (CSA)</text>
        </g>

        <!-- ========= Vertex 3: BOTTOM-RIGHT — Governance ========= -->
        <text x="710" y="610" class="axis-label" text-anchor="start">Governance</text>
        <g transform="translate(710,625)">
          <rect x="0" y="-2" width="116" height="22" rx="11" fill="#1e1b4b" stroke="#4338ca" stroke-width="1"/>
          <text x="58" y="13" class="axis-pill-text" text-anchor="middle">AAGMM</text>
        </g>

        <!-- ========= Vertex 4: BOTTOM — Domain ========= -->
        <text x="440" y="763" class="axis-label" text-anchor="middle">Domain</text>
        <g transform="translate(440,778)">
          <rect x="-58" y="-2" width="116" height="22" rx="11" fill="#1e1b4b" stroke="#4338ca" stroke-width="1"/>
          <text x="0" y="13" class="axis-pill-text" text-anchor="middle">arXiv 2602</text>
        </g>

        <!-- ========= Vertex 5: BOTTOM-LEFT — Strategy ========= -->
        <text x="170" y="610" class="axis-label" text-anchor="end">Strategy</text>
        <g transform="translate(54,625)">
          <rect x="0" y="-2" width="116" height="22" rx="11" fill="#1e1b4b" stroke="#4338ca" stroke-width="1"/>
          <text x="58" y="13" class="axis-pill-text" text-anchor="middle">Sema4.ai</text>
        </g>

        <!-- ========= Vertex 6: TOP-LEFT — Operations ========= -->
        <text x="170" y="270" class="axis-label" text-anchor="end">Operations</text>
        <g transform="translate(54,285)">
          <rect x="0" y="-2" width="116" height="22" rx="11" fill="#1e1b4b" stroke="#4338ca" stroke-width="1"/>
          <text x="58" y="13" class="axis-pill-text" text-anchor="middle">MS CMM</text>
        </g>
      </svg>
    </div>

    <div class="headline">
      Six axes. <span class="accent-warm">One blind spot</span> in the middle.
    </div>
    <div class="subline">
      What you measure depends on which framework you pick — <br>
      and what no framework measures, no agent improves.
    </div>
  </div>
  <div class="brand">evolving-agents · janrummel</div>
  <div class="footer">1 / 6</div>
</div>
</body>
</html>
