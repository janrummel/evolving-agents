<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Six-Axis Carousel — Base Template</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #0f1629; margin: 0; padding: 0; }

  .canvas {
    width: 1080px; height: 1350px;
    background: linear-gradient(145deg, #0f1629 0%, #161d35 40%, #1a1f3a 70%, #0f1629 100%);
    padding: 64px 72px;
    position: relative;
    overflow: hidden;
  }

  .canvas::before {
    content: ''; position: absolute; inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(99,102,241,0.04) 1px, transparent 0);
    background-size: 28px 28px; pointer-events: none;
  }

  h1, h2, h3 { color: #ffffff; font-weight: 700; }
  h1 { font-size: 48px; line-height: 1.15; letter-spacing: -0.02em; }
  h2 { font-size: 32px; line-height: 1.2; letter-spacing: -0.015em; }
  p, li { color: #cbd5e1; font-size: 24px; line-height: 1.55; }
  .accent { color: #818cf8; }
  .accent-strong { color: #6366f1; }
  code, .mono { font-family: 'JetBrains Mono', monospace; font-size: 18px; color: #a5b4fc; }
  .caption, .tagline {
    font-size: 16px; color: #818cf8; letter-spacing: 0.18em;
    text-transform: uppercase; font-weight: 600;
  }

  .footer {
    position: absolute; bottom: 32px; right: 40px;
    font-size: 14px; color: #64748b; font-weight: 500;
    letter-spacing: 0.05em;
  }
  .brand {
    position: absolute; bottom: 32px; left: 40px;
    font-size: 14px; color: #64748b; font-weight: 500;
    letter-spacing: 0.05em;
  }

  .cliffhanger {
    position: absolute; bottom: 80px; right: 56px;
    font-size: 14px; color: #818cf8; letter-spacing: 0.1em;
    font-weight: 500; display: flex; align-items: center; gap: 8px;
  }

  .logo-stamp {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 4px 10px; border: 1px solid #6366f1; border-radius: 6px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    color: #c7d2fe; background: rgba(99,102,241,0.08);
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="brand">evolving-agents · janrummel</div>
  <div class="footer">N / 6</div>
</div>
</body>
</html>
